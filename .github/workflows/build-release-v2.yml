name: Build Fisioarea desktop installers v2

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout progetto
        uses: actions/checkout@v4

      - name: Configura JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Mostra versioni strumenti
        shell: pwsh
        run: |
          java -version
          mvn -version
          jpackage --version
          Write-Host "OS env: $env:OS"
          Write-Host "Runner OS: $env:RUNNER_OS"

      - name: Crea installer Windows EXE
        shell: pwsh
        run: |
          & "${{ github.workspace }}\release\build-windows-exe.ps1"

      - name: Carica artifact Windows
        uses: actions/upload-artifact@v4
        with:
          name: fisioarea-windows-exe
          path: |
            target/release/windows/*.exe
            target/release/windows/*.msi
          if-no-files-found: error
          retention-days: 14

  build-macos-arm64-dmg:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-14

    steps:
      - name: Checkout progetto
        uses: actions/checkout@v4

      - name: Verifica architettura runner
        run: |
          uname -a
          test "$(uname -m)" = "arm64"

      - name: Configura JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Mostra versioni strumenti
        run: |
          java -version
          mvn -version
          jpackage --version

      - name: Crea installer macOS DMG Apple Silicon
        run: |
          chmod +x release/build-macos-arm64-dmg.sh
          ./release/build-macos-arm64-dmg.sh

      - name: Carica artifact macOS
        uses: actions/upload-artifact@v4
        with:
          name: fisioarea-macos-arm64-dmg
          path: target/release/macos-arm64/*.dmg
          if-no-files-found: error
          retention-days: 14

  create-github-release:
    name: Crea GitHub Release
    needs:
      - build-windows-exe
      - build-macos-arm64-dmg
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Scarica artifact Windows
        uses: actions/download-artifact@v4
        with:
          name: fisioarea-windows-exe
          path: release-assets

      - name: Scarica artifact macOS
        uses: actions/download-artifact@v4
        with:
          name: fisioarea-macos-arm64-dmg
          path: release-assets

      - name: Crea Release GitHub e allega installer
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
